spring.application.name=smart-office-booking

server.port=8080

spring.datasource.url=jdbc:h2:file:./data/smartoffice;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration

spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY:AIzaSyDEXYHsn-jZlXnZboZzojJzAt6f75DAPZk}
spring.ai.google.genai.chat.options.model=gemini-2.5-pro
spring.ai.google.genai.project-id=${GOOGLE_GENAI_PROJECT_ID:local-dev-project}
spring.ai.google.genai.location=${GOOGLE_GENAI_LOCATION:us-central1}

app.approval.duration-hours-threshold=4
app.approval.capacity-threshold=10
